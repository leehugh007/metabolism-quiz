function getRandomItems(arr, n) {
  const shuffled = [...arr].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

function calculateResult(answers) {
  const scores = { highRPM: 0, burnout: 0, rollerCoaster: 0, powerSave: 0, steady: 0 };

  answers.forEach((answer, idx) => {
    if (idx === 6) {
      // Q7 multiselect
      if (answer && answer.length > 0) {
        answer.forEach(scoreObj => {
          Object.entries(scoreObj).forEach(([type, val]) => {
            scores[type] += val;
          });
        });
      }
    } else {
      const typeId = TYPE_BY_KEY[answer];
      if (typeId) scores[typeId] += 1;
    }
  });

  // Find top types
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const [firstType, firstScore] = sorted[0];
  const [secondType, secondScore] = sorted[1];

  // Steady check
  if (firstType === 'steady' && firstScore >= 6) {
    return { primary: 'steady', secondary: null, scores };
  }
  const nonSteady = sorted.filter(([t]) => t !== 'steady');
  if (nonSteady.every(([, s]) => s <= 2)) {
    return { primary: 'steady', secondary: null, scores };
  }

  // Mixed type check
  if (firstScore - secondScore <= 1 && firstType !== 'steady' && secondType !== 'steady') {
    return { primary: firstType, secondary: secondType, scores };
  }

  return { primary: firstType, secondary: null, scores };
}

  const handleQ7Submit = () => {
    if (q7NoneSelected) {
      onAnswer([question.noneOption.scores]);
    } else {
      // Collect scores from all selected items
      const selectedScores = [];
      question.sections.forEach((section, si) => {
        section.options.forEach((opt, oi) => {
          if (q7Selected[`${si}-${oi}`]) {
            selectedScores.push(opt.scores);
          }
        });
      });
      onAnswer(selectedScores.length > 0 ? selectedScores : []);
    }
  };

  return (
    <div>
      <div className="progress-wrap">
        <div className="progress-info">
          <span>
            {questionIdx > 0 && <button className="back-btn" onClick={onBack}>← 上一題</button>}
          </span>
          <span>{questionIdx + 1} / {total}</span>
        </div>
        <div className="progress-bar">
          <div className="progress-fill" style={{ width: `${((questionIdx + 1) / total) * 100}%` }} />
        </div>
      </div>

      <div className="question-page" key={question.id}>
        <div className="question-num">Q{question.id}</div>
        <div className="question-text">{question.text}</div>

        {!isQ7 ? (
          <div className="options">
            {question.options.map((opt, idx) => (
              <button
                key={opt.key}
                className={`option-btn ${selected === opt.key ? 'selected' : ''}`}
                onClick={() => handleOptionClick(opt.key)}
              >
                <span className="option-label">{LABELS[idx]}</span>
                {opt.text}
              </button>
            ))}
          </div>
        ) : (
          <div>
            {question.sections.map((section, si) => (
              <div key={si}>
                <div className="q7-section-title">{section.title}</div>
                <div className="options">
                  {section.options.map((opt, oi) => {
                    const uid = `${si}-${oi}`;
                    const isChecked = !!q7Selected[uid];
                    return (
                      <button
                        key={uid}
                        className={`checkbox-btn ${isChecked ? 'selected' : ''}`}
                        onClick={() => handleQ7Toggle(uid)}
                      >
                        <span className="checkbox-icon">{isChecked ? '✓' : ''}</span>
                        <span>{opt.text}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
            <div style={{ marginTop: 12 }}>
              <button
                className={`checkbox-btn ${q7NoneSelected ? 'selected' : ''}`}
                onClick={handleQ7None}
              >
                <span className="checkbox-icon">{q7NoneSelected ? '✓' : ''}</span>
                <span>{question.noneOption.text}</span>
              </button>
            </div>
            <button className="q7-next-btn" onClick={handleQ7Submit}>下一題 →</button>
          </div>
        )}
      </div>
    </div>
  );
}

function LoadingPage() {

    <div className="loading-page">

// ===== MAIN APP =====

// Map Chinese type names to type IDs for URL matching
const TYPE_NAME_MAP = {
  '高轉速型': 'highRPM', '高轉速': 'highRPM',
  '燃燒殆盡型': 'burnout', '燃燒殆盡': 'burnout',
  '雲霄飛車型': 'rollerCoaster', '雲霄飛車': 'rollerCoaster',
  '省電模式型': 'powerSave', '省電模式': 'powerSave',
  '穩定燃燒型': 'steady', '穩定燃燒': 'steady',
  'highRPM': 'highRPM', 'burnout': 'burnout',
  'rollerCoaster': 'rollerCoaster', 'powerSave': 'powerSave', 'steady': 'steady'
};

function getInitialState() {
  const params = new URLSearchParams(window.location.search);
  const typeParam = params.get('type');
  if (typeParam && TYPE_NAME_MAP[typeParam]) {
    return { page: 'science', scienceTypeId: TYPE_NAME_MAP[typeParam] };
  }
  return { page: 'intro', scienceTypeId: null };
}

function App() {
  const initial = useMemo(() => getInitialState(), []);
  const [page, setPage] = useState(initial.page);
  const [questionIdx, setQuestionIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [result, setResult] = useState(null);
  const [scienceTypeId, setScienceTypeId] = useState(initial.scienceTypeId);

  const handleStart = () => {
    setPage('quiz');
    setQuestionIdx(0);
    setAnswers([]);
    // Clean URL
    window.history.replaceState({}, '', window.location.pathname);
  };

  const handleShowScience = (typeId) => {
    setScienceTypeId(typeId);
    setPage('science');
    window.scrollTo(0, 0);
  };

  const handleBackToResult = () => {
    setPage('result');
    window.scrollTo(0, 0);
  };

  const handleAnswer = (answer) => {
    const newAnswers = [...answers, answer];
    setAnswers(newAnswers);

    if (questionIdx < QUESTIONS.length - 1) {
      setQuestionIdx(questionIdx + 1);
    } else {
      // Done — show loading then result
      setPage('loading');
      setTimeout(() => {
        const r = calculateResult(newAnswers);
        setResult(r);
        setPage('result');
        window.scrollTo(0, 0);
      }, 2400);
    }
  };

  const handleBack = () => {
    if (questionIdx > 0) {
      setQuestionIdx(questionIdx - 1);
      setAnswers(answers.slice(0, -1));
    }
  };

  return (
    <div className="app">
      {page === 'intro' && <IntroPage onStart={handleStart} />}
      {page === 'quiz' && (
        <QuestionPage
          question={QUESTIONS[questionIdx]}
          questionIdx={questionIdx}
          total={QUESTIONS.length}
          onAnswer={handleAnswer}
          onBack={handleBack}
        />
      )}
      {page === 'loading' && <LoadingPage />}
      {page === 'result' && result && <ResultPage result={result} onRestart={handleStart} onShowScience={handleShowScience} />}
      {page === 'science' && scienceTypeId && <SciencePage typeId={scienceTypeId} onBack={handleBackToResult} onRestart={handleStart} hasResult={!!result} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
